spring.application.name=apigateway
server.port=8083

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webmvc.routes[0].id=patient
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://patient
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/patient/**

spring.cloud.gateway.server.webmvc.routes[1].id=doctor
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://doctor
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/doctor/**

spring.cloud.gateway.server.webmvc.routes[2].id=quizservice
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://quizservice
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/quiz/**

spring.cloud.gateway.server.webmvc.routes[3].id=questionservice
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://questionservice
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/question/**
